services:
  - type: web
    name: sistema-adopcion-web
    env: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DefaultConnection
        fromDatabase:
          name: sistemaadopcion-db
          property: connectionString

databases:
  - name: sistemaadopcion-db
    plan: free
    databaseName: SistemaAdopcionDB
    user: sistema_user
